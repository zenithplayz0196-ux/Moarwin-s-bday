<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moarwin Special Drop 🎬</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f0f0f, #1a0000);
    color: white;
    text-align: center;
    font-family: Arial;
    overflow: hidden;
}

h1 {
    font-size: 40px;
    margin-top: 100px;
    text-shadow: 0 0 20px red;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 30px red; }
}

button {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 20px;
    background: red;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 20px red;
}

button:hover {
    transform: scale(1.1);
}

#message {
    font-size: 22px;
    margin-top: 20px;
    white-space: pre-line;
}
</style>
</head>

<body>

<h1>🔥 MOARWIN OFFICIAL DROP 🔥</h1>

<button onclick="start()">▶ Play Video</button>

<div id="message"></div>

<script>
function start(){
    let text = "🎉 HAPPY BIRTHDAY MOARWIN 🎉\n\nTu sirf YouTuber nahi… full inspiration hai 🔥\n\nKeep growing... 1M soon loading 😎💥";
    let i = 0;
    let speed = 50;

    document.getElementById("message").innerHTML = "";

    function typeWriter(){
        if(i < text.length){
            document.getElementById("message").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, speed);
        }
    }

    typeWriter();
}
</script>

</body>
</html>
